<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart | Abiran</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html"><img src="logo.png" class="logo"></a>
    <span class="header-tagline">Luxury scents crafted for identity.</span>
    <a href="cart.html" class="cart-link">🛒 Cart</a>
</header>

<section class="cart-page">
    <h1>Order Summary</h1>

<div class="cart-box">
    <table class="cart-table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody id="cart-body"></tbody>
    </table>

    <h2 id="cart-total">Total: ৳0</h2>

    <a href="checkout.html" class="buy-btn">Proceed to Checkout</a>
</div>

</section>

<script src="script.js"></script>

</body>
</html>
